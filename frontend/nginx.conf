






# frontend/nginx.conf
# BUG ORIGINAL: proxy_pass http://backend:3000/  (con slash final)
# Esto hacía que /api/ventas llegara al backend como /ventas,
# causando 404 en todos los endpoints desde el contenedor frontend.
# CORRECCIÓN: eliminar el slash final para preservar el prefijo /api/.






server {
    listen 80;
    server_name _;








    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }






    root  /usr/share/nginx/html;
    index index.html;

    # ── API → backend (preserva el prefijo /api/) ──────────────────────────
    location /api/ {

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass         http://backend:3000;   # ← sin "/" al final
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Archivos estáticos: caché agresivo ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }





}
