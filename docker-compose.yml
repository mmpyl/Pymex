services:
  postgres:
    image: postgres:16-alpine
    container_name: sapyme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_pymes
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123_secure_local_2024}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d saas_pymes"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sapyme_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123_secure_local_2024}
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_default_dev_only}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      ML_SERVICE_URL: http://ml_service:8000/api
      FACTURACION_SERVICE_URL: http://facturacion_service:9000/api
      FACTURACION_TIMEOUT_MS: 15000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BOOTSTRAP_DISABLED: ${BOOTSTRAP_DISABLED:-true}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: sapyme_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml_service:
    build:
      context: ./ml_service
    container_name: sapyme_ml
    restart: unless-stopped
    environment:
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123_secure_local_2024}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  facturacion_service:
    build:
      context: ./facturacion-service
    container_name: sapyme_facturacion
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 9000
      SUNAT_RUC: "${SUNAT_RUC:-20123456789}"
      SUNAT_USER: ${SUNAT_USER:-MODDATOS}
      SUNAT_PASSWORD: ${SUNAT_PASSWORD:-moddatos}
      CERT_PATH: storage/certs/certificado.pfx
      CERT_PASSWORD: ""
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin123_secure_local_2024}
      STORAGE_XML: storage/xml/
      STORAGE_CDR: storage/cdr/
      STORAGE_PDF: storage/pdf/
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: sapyme_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
