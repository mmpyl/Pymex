services:
  postgres:
    image: postgres:16-alpine
    container_name: sapyme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_pymes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_pymes"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sapyme_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: postgres
      DB_PASSWORD: admin123
      JWT_SECRET: clave_super_secreta_saas_2024
      ML_SERVICE_URL: http://ml_service:8000/api
      FACTURACION_SERVICE_URL: http://facturacion_service:9000/api
      FACTURACION_TIMEOUT_MS: 15000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  ml_service:
    build:
      context: ./ml_service
    container_name: sapyme_ml
    restart: unless-stopped
    environment:
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: postgres
      DB_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  facturacion_service:
    build:
      context: ./facturacion-service
    container_name: sapyme_facturacion
    restart: unless-stopped
    environment:
      APP_ENV: beta
      APP_PORT: 9000
      SUNAT_RUC: "20123456789"
      SUNAT_USER: MODDATOS
      SUNAT_PASSWORD: moddatos
      CERT_PATH: storage/certs/certificado.pfx
      CERT_PASSWORD: ""
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_pymes
      DB_USER: postgres
      DB_PASSWORD: admin123
      STORAGE_XML: storage/xml/
      STORAGE_CDR: storage/cdr/
      STORAGE_PDF: storage/pdf/
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: sapyme_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
