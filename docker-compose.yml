version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapyme-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: sapyme-ml-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  facturacion_service:
    build:
      context: ./facturacion-service
      dockerfile: Dockerfile
    container_name: sapyme-facturacion-service
    ports:
      - "8080:80"
    restart: unless-stopped
