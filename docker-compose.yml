version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapyme-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3000"
    depends_on:
      - ml_service
      - facturacion_service
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapyme-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: sapyme-ml-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  facturacion_service:
    build:
      context: ./facturacion-service
      dockerfile: Dockerfile
    container_name: sapyme-facturacion-service
    ports:
      - "8080:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sapyme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redis_secure_pass_2024
    restart: unless-stopped

volumes:
  redis_data:
