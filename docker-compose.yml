version: '3.9'

services:
  database:
    image: postgres:16-alpine
    container_name: sapyme-database
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sapyme-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapyme-backend
    env_file:
      - ./.env
    ports:
      - "3001:3000"
    depends_on:
      database:
        condition: service_healthy
      ml_service:
        condition: service_started
      facturacion_service:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - sapyme-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapyme-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sapyme-network

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: sapyme-ml-service
    env_file:
      - ./.env
    environment:
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapyme-network

  facturacion_service:
    build:
      context: ./facturacion-service
      dockerfile: Dockerfile
    container_name: sapyme-facturacion-service
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - sapyme-network

  redis:
    image: redis:7-alpine
    container_name: sapyme-redis
    env_file:
      - ./.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD:?REDIS_PASSWORD is required}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --raw incr ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sapyme-network

volumes:
  postgres_data:
  redis_data:

networks:
  sapyme-network:
    driver: bridge
