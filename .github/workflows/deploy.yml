name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy. Leave empty to deploy the current branch SHA.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Validate Docker Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Fail if real env files are tracked
        run: |
          tracked_env_files=$(git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.local$|\.env\.[^.]+$' | grep -vE '(^|/)\.env\.example$' || true)
          if [ -n "$tracked_env_files" ]; then
            echo "Real environment files must not be committed:"
            echo "$tracked_env_files"
            exit 1
          fi

  deploy:
    name: Deploy with remote Docker Compose
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref || github.sha }}
        run: |
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail; \
             cd '$DEPLOY_PATH'; \
             test -f .env; \
             git fetch --all --prune; \
             git checkout '$DEPLOY_REF'; \
             git reset --hard '$DEPLOY_REF'; \
             docker compose pull --ignore-pull-failures; \
             docker compose up -d --build --remove-orphans; \
             docker compose ps"
